name: Block Spam Accounts

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run without blocking anyone
        required: false
        default: true
        type: boolean
  schedule:
    - cron: '0 7 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  block-spam-accounts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate automation token
        env:
          FOLLOW_BACK_TOKEN: ${{ secrets.FOLLOW_BACK_TOKEN }}
        run: |
          if [ -z "$FOLLOW_BACK_TOKEN" ]; then
            echo "Missing repository secret: FOLLOW_BACK_TOKEN"
            echo "Use a classic PAT with user scope support for blocking/following, or a fine-grained PAT with Followers: write and Block another user: write."
            exit 1
          fi

      - name: Detect and block spam accounts
        env:
          FOLLOW_BACK_TOKEN: ${{ secrets.FOLLOW_BACK_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: bun run block-spam-accounts

name: Auto Follow Back Followers

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run without following anyone
        required: false
        default: true
        type: boolean
      follow_back_limit:
        description: Optional limit for manual runs
        required: false
        default: ''
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  follow-back:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate follow-back token
        env:
          FOLLOW_BACK_TOKEN: ${{ secrets.FOLLOW_BACK_TOKEN }}
        run: |
          if [ -z "$FOLLOW_BACK_TOKEN" ]; then
            echo "Missing repository secret: FOLLOW_BACK_TOKEN"
            echo "Use a classic PAT with user:follow or a fine-grained PAT with Followers: write."
            exit 1
          fi

      - name: Follow back new followers
        env:
          FOLLOW_BACK_TOKEN: ${{ secrets.FOLLOW_BACK_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          FOLLOW_BACK_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.follow_back_limit || '' }}
        run: bun run follow-back

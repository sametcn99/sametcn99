name: Follow Repository Stargazers

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run without following anyone
        required: false
        default: true
        type: boolean
      follow_limit:
        description: Optional limit for a manual run
        required: false
        default: ""
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  follow-stargazers:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate follow token
        env:
          FOLLOW_BACK_TOKEN: ${{ secrets.FOLLOW_BACK_TOKEN }}
        run: |
          if [ -z "$FOLLOW_BACK_TOKEN" ]; then
            echo "Missing repository secret: FOLLOW_BACK_TOKEN"
            echo "Use a classic PAT with user:follow or a fine-grained PAT with Followers: write."
            echo "If you want private repository stargazers included, the token also needs access to those repositories."
            exit 1
          fi

      - name: Follow unique stargazers
        env:
          FOLLOW_BACK_TOKEN: ${{ secrets.FOLLOW_BACK_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ inputs.dry_run }}
          FOLLOW_LIMIT: ${{ inputs.follow_limit }}
        run: bun run follow-stargazers